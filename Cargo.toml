[package]
name = "linkura-cli"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.5.37", features = ["derive"] }
inquire = "0.7.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
colored = "3.0.0"
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.19", features = ["env-filter"] }
reqwest = {version = "0.12.15", features = ["json", "blocking"]}
rand = "0.9.1"
regex = "1.11.1"
spinoff = "0.8.0"

# No need for concurrent for now
# tokio = { version = "1.44.2", features = ["full"] }
# once_cell = "1.21.3"